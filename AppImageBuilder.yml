version: 1

AppDir:
  path: AppDir

  app_info:
    id: grassy
    name: Grassy
    icon: grassy
    version: "1.0.0"
    exec: usr/bin/grassy
    exec_args: "$@"

  apt:
    arch: amd64
    allow_unauthenticated: true  # ✅ This bypasses GPG key issues
    sources:
      - sourceline: "deb http://archive.ubuntu.com/ubuntu jammy main universe"

    include:
      # Python runtime
      - python3
      - python3-pip
      - python3-gi
      - python3-venv

      # GTK4 + libadwaita
      - libgtk-4-1
      - gir1.2-gtk-4.0
      - libadwaita-1-0
      - gir1.2-adw-1
      - libgtk-4-bin

      # Low-level deps
      - libcairo2
      - libglib2.0-0
      - libgirepository-1.0-1
      - libpango-1.0-0
      - libpangocairo-1.0-0
      - libgdk-pixbuf-2.0-0

  files:
    include:
      - src/
    exclude:
      - "**/__pycache__"
      - "**/*.pyc"

  runtime:
    env:
      PYTHONPATH: "/usr/lib/python3/dist-packages"
      GI_TYPELIB_PATH: "/usr/lib/x86_64-linux-gnu/girepository-1.0"

  after_bundle:
    - |
      echo "📦 Installing Python dependencies..."
      ./AppDir/usr/bin/python3 -m pip install --no-cache-dir \
        requests \
        appdirs \
        urllib3
      
      echo "✅ Python dependencies installed"

    - |
      echo "🚀 Creating launcher script..."
      mkdir -p AppDir/usr/bin

      cat > AppDir/usr/bin/grassy << 'EOF'
      #!/usr/bin/env bash
      HERE="$(dirname "$(readlink -f "$0")")"
      export PYTHONPATH="${HERE}/../lib/python3/dist-packages:${PYTHONPATH}"
      export GI_TYPELIB_PATH="${HERE}/../lib/x86_64-linux-gnu/girepository-1.0"
      
      exec "${HERE}/python3" "${HERE}/../src/main.py" "$@"
      EOF

      chmod +x AppDir/usr/bin/grassy
      echo "✅ Launcher created"

    - |
      echo "📝 Creating desktop file..."
      cat > AppDir/grassy.desktop << 'EOF'
      [Desktop Entry]
      Type=Application
      Name=Grassy
      Comment=Minecraft Server Manager
      Exec=grassy
      Icon=grassy
      Terminal=false
      Categories=Game;System;
      EOF
      
      echo "✅ AppImage preparation complete"

AppImage:
  arch: x86_64
  update-information: guess
