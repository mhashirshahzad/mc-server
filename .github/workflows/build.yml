name: Build & Release Grassy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 \
            python3-pip \
            python3-gi \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            make

      - name: Install Python packages
        run: |
          pip install --user pyinstaller requests appdirs

      - name: Get version from Makefile
        id: version
        run: |
          VERSION=$(make version)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build binary
        run: |
          pyinstaller --onefile \
            --name grassy \
            --hidden-import=gi \
            --hidden-import=gi.repository \
            --add-data "src:src" \
            src/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: grassy-linux
          path: dist/grassy

  release:
    needs: [build-linux]
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from Makefile
        id: version
        run: |
          VERSION=$(make version)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: grassy-linux
          path: release/

      - name: Make binary executable
        run: |
          chmod +x release/grassy

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Grassy v${{ steps.version.outputs.VERSION }}
          body: |
            ## Grassy v${{ steps.version.outputs.VERSION }}
            
            ### Installation:
            ```bash
            # Download the binary
            wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/grassy
            
            # Make it executable
            chmod +x grassy
            
            # Optional: move to PATH
            sudo mv grassy /usr/local/bin/
            
            # Run
            grassy
