name: Build and Release Windows Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true

      - name: Run build script in MSYS2 shell
        shell: msys2 {0}
        run: |
          bash ./windows/build.sh

      - name: Create portable ZIP archive (7-Zip, POSIX-safe)
        run: |
          cd dist
          7z a -tzip ..\..\grassy-windows-portable-amd64.zip grassy

      - name: Upload artifact (ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: Grassy-Windows-Portable
          path: grassy-windows-portable-amd64.zip
          compression-level: 0

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: grassy-windows-portable-amd64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
